<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>droidlab · playlists</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23060d12'/%3E%3Crect x='1' y='1' width='30' height='30' rx='5' fill='none' stroke='%2300d4ff' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='3' fill='none' stroke='%2300d4ff' stroke-width='1.5'/%3E%3Cline x1='16' y1='6' x2='16' y2='10' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='22' x2='16' y2='26' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='6' y1='16' x2='10' y2='16' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='22' y1='16' x2='26' y2='16' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='9.17' y1='9.17' x2='11.99' y2='11.99' stroke='%2300b4a0' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='20.01' y1='20.01' x2='22.83' y2='22.83' stroke='%2300b4a0' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='9.17' y1='22.83' x2='11.99' y2='20.01' stroke='%2300b4a0' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='20.01' y1='11.99' x2='22.83' y2='9.17' stroke='%2300b4a0' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060d12;
      --bg2: #0a1520;
      --bg3: #0e1f2e;
      --cyan: #00d4ff;
      --teal: #00b4a0;
      --cyan-dim: rgba(0,212,255,0.15);
      --cyan-glow: rgba(0,212,255,0.06);
      --text: #c8e8f0;
      --text-dim: #5a8a9a;
      --border: rgba(0,212,255,0.12);
      --border-hover: rgba(0,212,255,0.35);
    }
    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,180,160,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,212,255,0.05) 0%, transparent 50%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .card {
      position: relative;
      z-index: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 44px;
      width: min(420px, calc(100vw - 40px));
      text-align: center;
      box-shadow: 0 0 60px rgba(0,212,255,0.04), 0 24px 48px rgba(0,0,0,0.4);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      border: 1.5px solid var(--cyan);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(0,212,255,0.2), inset 0 0 12px rgba(0,212,255,0.05);
    }
    .logo-icon svg { width: 22px; height: 22px; stroke: var(--cyan); fill: none; stroke-width: 1.5; }
    .logo-text { text-align: left; }
    .logo-name { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.08em; color: #fff; text-shadow: 0 0 20px rgba(0,212,255,0.3); }
    .logo-name span { color: var(--cyan); }
    .logo-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.12em; }
    .logo-sub::before { content: '> '; color: var(--teal); }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.06em; color: #fff; margin-bottom: 8px; }
    p { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 32px; }
    p code { color: var(--cyan); }
    .login-btn {
      display: inline-flex; align-items: center; gap: 12px;
      background: #5865F2; color: #fff; text-decoration: none;
      font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 1rem;
      letter-spacing: 0.06em;
      padding: 12px 24px; border-radius: 8px;
      transition: all 0.2s; width: 100%; justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .login-btn:hover { background: #4752c4; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(88,101,242,0.3); }
    .divider {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; color: var(--teal); letter-spacing: 0.18em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
      margin: 28px 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(0,180,160,0.3), transparent); }
    .divider::after { background: linear-gradient(270deg, rgba(0,180,160,0.3), transparent); }
    .features { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: left; }
    .feature {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px;
    }
    .feature strong { display: block; font-size: 0.9rem; font-weight: 600; color: var(--cyan); letter-spacing: 0.04em; margin-bottom: 2px; }
    .feature span { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--text-dim); }
    .error-banner {
      display: none; background: rgba(160,48,48,0.15); border: 1px solid rgba(160,48,48,0.3);
      color: #e06060; border-radius: 6px; padding: 10px 14px;
      font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; margin-bottom: 20px;
    }
    .error-banner.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">droid<span>lab</span></div>
        <div class="logo-sub">playlist manager</div>
      </div>
    </div>
    <h1>YOUR MUSIC, YOUR QUEUE</h1>
    <p>Create playlists from Spotify and YouTube.<br>Play them in Discord with <code>/playlist play</code></p>
    <div class="error-banner" id="errorBanner"></div>
    <a href="/auth/discord" class="login-btn">
      <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="white">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
      </svg>
      CONTINUE WITH DISCORD
    </a>
    <div class="divider">features</div>
    <div class="features">
      <div class="feature"><strong>YouTube</strong><span>Search & add tracks</span></div>
      <div class="feature"><strong>Spotify</strong><span>Import playlists</span></div>
      <div class="feature"><strong>Discord</strong><span>/playlist play</span></div>
      <div class="feature"><strong>Private</strong><span>Only you can see</span></div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const err = params.get('error');
    if (err) {
      const banner = document.getElementById('errorBanner');
      const msgs = { oauth_denied: 'login cancelled.', oauth_failed: 'login failed — try again.' };
      banner.textContent = msgs[err] || 'something went wrong.';
      banner.classList.add('show');
    }
  </script>
</body>
</html>

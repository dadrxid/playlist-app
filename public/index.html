<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>droidlab · playlists</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan:    #00d4ff;
      --bg:      #080b10;
      --bg2:     #0d1117;
      --bg3:     #141920;
      --border:  rgba(0,212,255,0.12);
      --text:    #e8edf2;
      --muted:   #4a5568;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridScroll {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.15;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--cyan); top: -200px; left: -100px; animation: float 8s ease-in-out infinite; }
    .orb-2 { width: 400px; height: 400px; background: #0066ff; bottom: -150px; right: -100px; animation: float 10s ease-in-out infinite reverse; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(30px, 20px); }
    }
    .card {
      position: relative;
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 52px 48px;
      width: min(440px, calc(100vw - 40px));
      text-align: center;
      box-shadow: 0 0 60px rgba(0,212,255,0.06), 0 24px 48px rgba(0,0,0,0.4);
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 36px; }
    .logo-text { font-size: 1.4rem; font-weight: 800; color: var(--cyan); letter-spacing: -0.02em; }
    .logo-sub { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
    h1 { font-size: 2rem; font-weight: 800; line-height: 1.15; margin-bottom: 12px; letter-spacing: -0.03em; }
    h1 span { color: var(--cyan); }
    p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 36px; }
    .login-btn {
      display: inline-flex; align-items: center; gap: 12px;
      background: #5865F2; color: #fff; text-decoration: none;
      font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.95rem;
      padding: 14px 28px; border-radius: 10px;
      transition: all 0.2s ease; width: 100%; justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .login-btn:hover { background: #4752c4; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(88,101,242,0.3); }
    .divider {
      display: flex; align-items: center; gap: 12px; margin: 24px 0;
      color: var(--muted); font-size: 0.75rem; font-family: 'Space Mono', monospace;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .features { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 32px; text-align: left; }
    .feature { background: rgba(0,212,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 0.8rem; color: var(--muted); }
    .feature strong { display: block; color: var(--text); font-size: 0.85rem; margin-bottom: 2px; }
    .error-banner {
      display: none; background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.2);
      color: #ff6b6b; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem;
      margin-bottom: 20px; font-family: 'Space Mono', monospace;
    }
    .error-banner.show { display: block; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="card">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
        <circle cx="20" cy="20" r="10" stroke="#00d4ff" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="2.5" fill="#00d4ff"/>
        <line x1="20" y1="2" x2="20" y2="10" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="30" x2="20" y2="38" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="20" x2="10" y2="20" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="30" y1="20" x2="38" y2="20" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="logo-text">droidlab</div>
        <div class="logo-sub">playlist manager</div>
      </div>
    </div>
    <h1>Your music,<br><span>your queue.</span></h1>
    <p>Create playlists from Spotify and YouTube.<br>Play them in Discord with <code style="color:var(--cyan);font-size:0.85em">/playlist play</code></p>
    <div class="error-banner" id="errorBanner"></div>
    <a href="/auth/discord" class="login-btn">
      <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="white">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
      </svg>
      Continue with Discord
    </a>
    <div class="divider">what you get</div>
    <div class="features">
      <div class="feature"><strong>YouTube</strong>Search & add tracks</div>
      <div class="feature"><strong>Spotify</strong>Import playlists</div>
      <div class="feature"><strong>Discord bot</strong>/playlist play</div>
      <div class="feature"><strong>Private</strong>Only you can see</div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const err = params.get('error');
    if (err) {
      const banner = document.getElementById('errorBanner');
      const msgs = { oauth_denied: 'Login cancelled.', oauth_failed: 'Login failed — try again.' };
      banner.textContent = msgs[err] || 'Something went wrong.';
      banner.classList.add('show');
    }
  </script>
</body>
</html>

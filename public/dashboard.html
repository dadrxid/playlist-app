<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>droidlab · playlists</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23060d12'/%3E%3Crect x='1' y='1' width='30' height='30' rx='5' fill='none' stroke='%2300d4ff' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='3' fill='none' stroke='%2300d4ff' stroke-width='1.5'/%3E%3Cline x1='16' y1='6' x2='16' y2='10' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='22' x2='16' y2='26' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='6' y1='16' x2='10' y2='16' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='22' y1='16' x2='26' y2='16' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='9.17' y1='9.17' x2='11.99' y2='11.99' stroke='%2300b4a0' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='20.01' y1='20.01' x2='22.83' y2='22.83' stroke='%2300b4a0' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='9.17' y1='22.83' x2='11.99' y2='20.01' stroke='%2300b4a0' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='20.01' y1='11.99' x2='22.83' y2='9.17' stroke='%2300b4a0' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060d12; --bg2: #0a1520; --bg3: #0e1f2e;
      --cyan: #00d4ff; --teal: #00b4a0;
      --cyan-dim: rgba(0,212,255,0.15); --cyan-glow: rgba(0,212,255,0.06);
      --text: #c8e8f0; --text-dim: #5a8a9a;
      --border: rgba(0,212,255,0.12); --border-hover: rgba(0,212,255,0.35);
      --danger: #a03030;
    }
    html, body { min-height: 100vh; background: var(--bg); font-family: 'Rajdhani', sans-serif; color: var(--text); }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,180,160,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,212,255,0.05) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }
    .sidebar {
      width: 220px; flex-shrink: 0; background: rgba(10,21,32,0.95);
      border-right: 1px solid var(--border); padding: 24px 14px;
      display: flex; flex-direction: column; gap: 4px;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 8px 10px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .logo-icon { width: 34px; height: 34px; border: 1.5px solid var(--cyan); border-radius: 6px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 12px rgba(0,212,255,0.2); flex-shrink: 0; }
    .logo-icon svg { width: 18px; height: 18px; stroke: var(--cyan); fill: none; stroke-width: 1.5; }
    .logo-name { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em; color: #fff; }
    .logo-name span { color: var(--cyan); }
    .logo-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; color: var(--text-dim); letter-spacing: 0.1em; }
    .logo-sub::before { content: '> '; color: var(--teal); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 500; letter-spacing: 0.04em; color: var(--text-dim); transition: all 0.15s; border: 1px solid transparent; text-decoration: none; }
    .nav-item:hover { background: var(--bg3); color: var(--text); border-color: var(--border); }
    .nav-item.active { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.2); color: var(--cyan); }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .user-pill { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border); }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--bg2); border: 1px solid rgba(0,212,255,0.2); overflow: hidden; flex-shrink: 0; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.04em; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .logout-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 2px; transition: color 0.15s; }
    .logout-btn:hover { color: #e06060; }
    .main { flex: 1; padding: 32px 36px; overflow-y: auto; }
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .main { padding: 20px 16px; }
      .playlist-grid { grid-template-columns: 1fr 1fr; }
      .mobile-nav { display: flex; }
    }
    .mobile-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,21,32,0.97); border-top: 1px solid var(--border);
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      z-index: 50; justify-content: space-around;
    }
    .mobile-nav a { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim); text-decoration: none; font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; letter-spacing: 0.08em; }
    .mobile-nav a svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .mobile-nav a.active { color: var(--cyan); }
    .page { display: none; }
    .page.active { display: block; animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .section-label { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--teal); letter-spacing: 0.18em; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(0,180,160,0.3), transparent); }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.95rem; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .btn-primary { background: var(--cyan-dim); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
    .btn-primary:hover { background: rgba(0,212,255,0.25); border-color: var(--cyan); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--text-dim); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-hover); background: var(--bg3); }
    .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .playlist-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .playlist-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--cyan-glow), transparent 60%); opacity: 0; transition: opacity 0.2s; }
    .playlist-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .playlist-card:hover::before { opacity: 1; }
    .playlist-card-icon { width: 40px; height: 40px; background: var(--cyan-dim); border: 1px solid rgba(0,212,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; color: var(--cyan); }
    .playlist-card-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .playlist-card-name { font-size: 1rem; font-weight: 600; letter-spacing: 0.04em; color: #e8f4f8; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playlist-card-meta { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
    .badge { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; padding: 1px 7px; border-radius: 3px; background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.15); color: var(--cyan); }
    .badge.private { background: rgba(160,48,48,0.15); border-color: rgba(160,48,48,0.3); color: #e06060; }
    .card-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .playlist-card:hover .card-actions { opacity: 1; }
    .icon-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim); width: 26px; height: 26px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
    .icon-btn:hover { color: var(--text); border-color: var(--border-hover); }
    .icon-btn.danger:hover { color: #e06060; border-color: rgba(160,48,48,0.4); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty-state svg { opacity: 0.15; margin-bottom: 16px; stroke: var(--cyan); }
    .empty-state p { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; }
    #backBtn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text-dim); cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; margin-bottom: 20px; transition: color 0.15s; }
    #backBtn:hover { color: var(--cyan); }
    .track-list { display: flex; flex-direction: column; gap: 6px; }
    .track-item { display: flex; align-items: center; gap: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; transition: all 0.15s; }
    .track-item:hover { border-color: var(--border-hover); }
    .track-thumb { width: 40px; height: 40px; border-radius: 4px; background: var(--bg3); object-fit: cover; flex-shrink: 0; }
    .track-info { flex: 1; min-width: 0; }
    .track-title { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e8f4f8; }
    .track-artist { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-source { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; padding: 1px 7px; border-radius: 3px; flex-shrink: 0; }
    .track-source.youtube { background: rgba(255,60,60,0.1); color: #e06060; border: 1px solid rgba(255,60,60,0.2); }
    .track-source.spotify { background: rgba(30,215,96,0.1); color: #1ed760; border: 1px solid rgba(30,215,96,0.2); }
    .track-duration { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--text-dim); flex-shrink: 0; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border-hover); border-radius: 10px; padding: 28px; width: min(400px, calc(100vw - 32px)); animation: modalIn 0.2s ease both; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal h2 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 20px; color: #e8f4f8; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--teal); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
    input[type="text"], input[type="search"] { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; letter-spacing: 0.04em; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: rgba(0,212,255,0.4); }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.95rem; font-weight: 500; letter-spacing: 0.04em; }
    .toggle { width: 38px; height: 20px; background: var(--bg3); border-radius: 10px; position: relative; cursor: pointer; transition: background 0.2s; border: 1px solid var(--border); }
    .toggle.on { background: rgba(0,180,160,0.3); border-color: var(--teal); }
    .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: var(--text-dim); border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
    .toggle.on::after { transform: translateX(18px); background: var(--teal); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .search-results { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .search-result { display: flex; align-items: center; gap: 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; cursor: pointer; transition: all 0.15s; }
    .search-result:hover { border-color: var(--border-hover); }
    .search-result img { width: 38px; height: 38px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
    .result-info { flex: 1; min-width: 0; }
    .result-title { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e8f4f8; }
    .result-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; color: var(--text-dim); }
    .add-icon { color: var(--teal); flex-shrink: 0; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--border-hover); border-radius: 6px; padding: 10px 16px; font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; z-index: 200; animation: fadeUp 0.3s ease; pointer-events: none; letter-spacing: 0.06em; }
    .toast.success { border-color: rgba(0,180,160,0.4); color: var(--teal); }
    .toast.error { border-color: rgba(160,48,48,0.4); color: #e06060; }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
      </div>
      <div>
        <div class="logo-name">droid<span>lab</span></div>
        <div class="logo-sub">playlists</div>
      </div>
    </div>
    <a class="nav-item active" data-page="playlists" onclick="showPage('playlists')">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      My Playlists
    </a>
    <a class="nav-item" href="/profile">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Profile
    </a>
    <a class="nav-item" href="https://droidlab.org" target="_blank">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      droidlab.org
    </a>
    <div class="sidebar-bottom">
      <div class="user-pill">
        <div class="avatar" id="sidebarAvatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="#5a8a9a" stroke-width="2" style="padding:4px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <span class="user-name" id="sidebarName">loading...</span>
        <button class="logout-btn" onclick="logout()" title="Logout">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="page active" id="page-playlists">
      <div class="page-header">
        <div class="section-label" style="flex:1;margin-right:20px">playlists</div>
        <button class="btn btn-primary" onclick="openCreateModal()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          NEW PLAYLIST
        </button>
      </div>
      <div class="playlist-grid" id="playlistGrid"><div class="spinner"></div></div>
    </div>

    <div class="page" id="page-tracks">
      <button id="backBtn" onclick="showPage('playlists')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        &lt; BACK TO PLAYLISTS
      </button>
      <div class="page-header">
        <div>
          <div class="section-label" id="trackPageTitle">playlist</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text-dim);margin-top:4px" id="trackPageMeta"></div>
        </div>
        <button class="btn btn-primary" onclick="openAddTrackModal()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          ADD TRACK
        </button>
      </div>
      <div class="track-list" id="trackList"></div>
    </div>
  </main>
</div>

<!-- Mobile Nav -->
<nav class="mobile-nav">
  <a href="#" class="active" onclick="showPage('playlists');return false;">
    <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    playlists
  </a>
  <a href="/profile">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    profile
  </a>
  <a href="https://droidlab.org" target="_blank">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
    home
  </a>
</nav>

<!-- Create Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h2>NEW PLAYLIST</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="newPlaylistName" placeholder="e.g. late night drives" maxlength="60" autocomplete="off">
    </div>
    <div class="form-group">
      <div class="toggle-row">
        <span>Private</span>
        <div class="toggle on" id="privateToggle" onclick="this.classList.toggle('on')"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('createModal')">CANCEL</button>
      <button class="btn btn-primary" onclick="createPlaylist()">CREATE</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>EDIT PLAYLIST</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="editPlaylistName" maxlength="60" autocomplete="off">
    </div>
    <div class="form-group">
      <div class="toggle-row">
        <span>Private</span>
        <div class="toggle" id="editPrivateToggle" onclick="this.classList.toggle('on')"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">CANCEL</button>
      <button class="btn btn-primary" onclick="saveEdit()">SAVE</button>
    </div>
  </div>
</div>

<!-- Add Track Modal -->
<div class="modal-overlay" id="addTrackModal">
  <div class="modal">
    <h2>ADD TRACK</h2>
    <div class="form-group" style="display:flex;gap:8px">
      <input type="search" id="trackSearch" placeholder="Search YouTube or paste Spotify/YouTube URL…" style="flex:1" autocomplete="off">
      <button class="btn btn-primary" onclick="searchTracks()">SEARCH</button>
    </div>
    <div id="searchResults"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addTrackModal')">CLOSE</button>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let playlists = [];
let currentPlaylistId = null;
let editingPlaylistId = null;

async function init() {
  try {
    const res = await fetch('/auth/me');
    if (!res.ok) { window.location.href = '/'; return; }
    currentUser = await res.json();
    renderUser(currentUser);
    await loadPlaylists();
  } catch { window.location.href = '/'; }
}

function renderUser(user) {
  document.getElementById('sidebarName').textContent = user.global_name || user.username;
  const avatarEl = document.getElementById('sidebarAvatar');
  if (user.avatar) {
    avatarEl.innerHTML = `<img src="https://cdn.discordapp.com/avatars/${user.discord_id}/${user.avatar}.png?size=64" alt="">`;
  }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${id}`).classList.add('active');
  document.querySelectorAll('.nav-item[data-page]').forEach(n => n.classList.toggle('active', n.dataset.page === id));
}

async function loadPlaylists() {
  const res = await fetch('/api/playlists');
  playlists = await res.json();
  renderPlaylists();
}

function renderPlaylists() {
  const grid = document.getElementById('playlistGrid');
  if (!playlists.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke-width="1"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <p>no playlists yet.<br>create one to get started.</p>
    </div>`;
    return;
  }
  grid.innerHTML = playlists.map(p => `
    <div class="playlist-card" onclick="openPlaylist(${p.id})">
      <div class="card-actions">
        <div class="icon-btn" onclick="event.stopPropagation();editPlaylist(${p.id})" title="Edit">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div class="icon-btn danger" onclick="event.stopPropagation();deletePlaylist(${p.id})" title="Delete">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </div>
      </div>
      <div class="playlist-card-icon">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="playlist-card-name">${escHtml(p.name)}</div>
      <div class="playlist-card-meta">
        <span>${p.track_count} track${p.track_count === 1 ? '' : 's'}</span>
        <span class="badge ${p.private ? 'private' : ''}">${p.private ? 'private' : 'public'}</span>
      </div>
    </div>
  `).join('');
}

function openCreateModal() {
  document.getElementById('newPlaylistName').value = '';
  document.getElementById('privateToggle').classList.add('on');
  openModal('createModal');
  setTimeout(() => document.getElementById('newPlaylistName').focus(), 100);
}

async function createPlaylist() {
  const name = document.getElementById('newPlaylistName').value.trim();
  if (!name) return;
  const priv = document.getElementById('privateToggle').classList.contains('on');
  const res = await fetch('/api/playlists', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, private: priv }),
  });
  if (res.ok) { closeModal('createModal'); await loadPlaylists(); toast('playlist created', 'success'); }
  else { const err = await res.json(); toast(err.error || 'failed', 'error'); }
}

function editPlaylist(id) {
  const playlist = playlists.find(p => p.id === id);
  if (!playlist) return;
  editingPlaylistId = id;
  document.getElementById('editPlaylistName').value = playlist.name;
  const toggle = document.getElementById('editPrivateToggle');
  if (playlist.private) { toggle.classList.add('on'); } else { toggle.classList.remove('on'); }
  openModal('editModal');
  setTimeout(() => document.getElementById('editPlaylistName').focus(), 100);
}

async function saveEdit() {
  const name = document.getElementById('editPlaylistName').value.trim();
  if (!name) return;
  const priv = document.getElementById('editPrivateToggle').classList.contains('on');
  const res = await fetch(`/api/playlists/${editingPlaylistId}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, private: priv }),
  });
  if (res.ok) { closeModal('editModal'); await loadPlaylists(); toast('playlist updated', 'success'); }
  else { toast('failed to update', 'error'); }
}

async function deletePlaylist(id) {
  if (!confirm('delete this playlist?')) return;
  const res = await fetch(`/api/playlists/${id}`, { method: 'DELETE' });
  if (res.ok) { await loadPlaylists(); toast('deleted', 'success'); }
}

async function openPlaylist(id) {
  currentPlaylistId = id;
  const playlist = playlists.find(p => p.id === id);
  document.getElementById('trackPageTitle').textContent = playlist.name;
  document.getElementById('trackPageMeta').textContent = `${playlist.track_count} track${playlist.track_count === 1 ? '' : 's'} · ${playlist.private ? 'private' : 'public'}`;
  showPage('tracks');
  await loadTracks(id);
}

async function loadTracks(id) {
  const list = document.getElementById('trackList');
  list.innerHTML = '<div class="spinner"></div>';
  const res = await fetch(`/api/playlists/${id}/tracks`);
  const tracks = await res.json();
  if (!tracks.length) { list.innerHTML = `<div class="empty-state"><p>no tracks yet. add some!</p></div>`; return; }
  list.innerHTML = tracks.map(t => `
    <div class="track-item" id="track-${t.id}">
      ${t.thumbnail ? `<img class="track-thumb" src="${escHtml(t.thumbnail)}" alt="">` : `<div class="track-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--text-dim)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/></svg></div>`}
      <div class="track-info">
        <div class="track-title">${escHtml(t.title)}</div>
        <div class="track-artist">${escHtml(t.artist || '—')}</div>
      </div>
      <span class="track-source ${t.source}">${t.source}</span>
      ${t.duration ? `<span class="track-duration">${formatDuration(t.duration)}</span>` : ''}
      <div class="icon-btn danger" onclick="deleteTrack(${t.id})">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
  `).join('');
}

async function deleteTrack(id) {
  const res = await fetch(`/api/tracks/${id}`, { method: 'DELETE' });
  if (res.ok) { document.getElementById(`track-${id}`)?.remove(); toast('track removed', 'success'); }
}

function openAddTrackModal() {
  document.getElementById('trackSearch').value = '';
  document.getElementById('searchResults').innerHTML = '';
  openModal('addTrackModal');
  setTimeout(() => document.getElementById('trackSearch').focus(), 100);
}

async function searchTracks() {
  const query = document.getElementById('trackSearch').value.trim();
  if (!query) return;
  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '<div class="spinner"></div>';
  const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
  const data = await res.json();
  if (!data.results?.length) { resultsEl.innerHTML = '<p style="color:var(--text-dim);font-family:\'Share Tech Mono\',monospace;font-size:0.7rem;text-align:center;padding:16px">no results found</p>'; return; }
  resultsEl.innerHTML = `<div class="search-results">${data.results.map(r => `
    <div class="search-result" onclick='addTrack(${JSON.stringify(r)})'>
      <img src="${escHtml(r.thumbnail || '')}" alt="" onerror="this.style.display='none'">
      <div class="result-info">
        <div class="result-title">${escHtml(r.title)}</div>
        <div class="result-sub">${escHtml(r.artist || '')} ${r.duration ? '· ' + formatDuration(r.duration) : ''}</div>
      </div>
      <svg class="add-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
  `).join('')}</div>`;
}

async function addTrack(track) {
  const res = await fetch(`/api/playlists/${currentPlaylistId}/tracks`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(track),
  });
  if (res.ok) {
    toast(`added: ${track.title}`, 'success');
    await loadTracks(currentPlaylistId);
    const p = playlists.find(p => p.id === currentPlaylistId);
    if (p) { p.track_count++; document.getElementById('trackPageMeta').textContent = `${p.track_count} track${p.track_count === 1 ? '' : 's'} · ${p.private ? 'private' : 'public'}`; }
  } else { toast('failed to add track', 'error'); }
}

async function logout() {
  await fetch('/auth/logout', { method: 'POST' });
  window.location.href = '/';
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  if (e.key === 'Enter' && document.getElementById('createModal').classList.contains('open')) createPlaylist();
  if (e.key === 'Enter' && document.getElementById('editModal').classList.contains('open')) saveEdit();
  if (e.key === 'Enter' && document.getElementById('addTrackModal').classList.contains('open')) searchTracks();
});

document.querySelectorAll('.modal-overlay').forEach(el => el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); }));

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDuration(secs) {
  if (!secs) return '';
  const m = Math.floor(secs / 60), s = secs % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

let toastTimer;
function toast(msg, type = 'success') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 3000);
}

init();
</script>
</body>
</html>
